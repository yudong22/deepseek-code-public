name: Release macOS Client

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name for the release (e.g. v0.1.0-beta.1)'
        required: false
        default: 'manual-build'

jobs:
  release:
    permissions:
      contents: write
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './apps/desktop/src-tauri -> target'

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Export macOS Signing & Notarization Env (if secrets are set)
        shell: bash
        run: |
          if [ -n "${{ secrets.APPLE_CERTIFICATE }}" ]; then
            echo "APPLE_CERTIFICATE=${{ secrets.APPLE_CERTIFICATE }}" >> $GITHUB_ENV
          fi
          if [ -n "${{ secrets.APPLE_CERTIFICATE_PASSWORD }}" ]; then
            echo "APPLE_CERTIFICATE_PASSWORD=${{ secrets.APPLE_CERTIFICATE_PASSWORD }}" >> $GITHUB_ENV
          fi
          if [ -n "${{ secrets.APPLE_SIGNING_IDENTITY }}" ]]; then
            echo "APPLE_SIGNING_IDENTITY=${{ secrets.APPLE_SIGNING_IDENTITY }}" >> $GITHUB_ENV
          fi
          if [ -n "${{ secrets.APPLE_ID }}" ]; then
            echo "APPLE_ID=${{ secrets.APPLE_ID }}" >> $GITHUB_ENV
          fi
          if [ -n "${{ secrets.APPLE_PASSWORD }}" ]]; then
            echo "APPLE_PASSWORD=${{ secrets.APPLE_PASSWORD }}" >> $GITHUB_ENV
          fi
          if [ -n "${{ secrets.APPLE_TEAM_ID }}" ]]; then
            echo "APPLE_TEAM_ID=${{ secrets.APPLE_TEAM_ID }}" >> $GITHUB_ENV
          fi

      - name: Export Updater Signing Env (for auto-update)
        shell: bash
        run: |
          if [ -n "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}" ]; then
            echo "TAURI_SIGNING_PRIVATE_KEY=${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}" >> $GITHUB_ENV
          fi
          if [ -n "${{ secrets.TAURI_SIGNING_KEY_PASSWORD }}" ]]; then
            echo "TAURI_SIGNING_KEY_PASSWORD=${{ secrets.TAURI_SIGNING_KEY_PASSWORD }}" >> $GITHUB_ENV
          fi

      - name: Build and Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event.inputs.tag_name || github.ref_name }}
          releaseName: 'deepseek-code ${{ github.event.inputs.tag_name || github.ref_name }}'
          releaseBody: 'Automatic pre-release build for macOS Apple Silicon.'
          prerelease: true
          projectPath: apps/desktop
          tauriScript: bun run tauri
          args: --target aarch64-apple-darwin

      - name: Generate updater signature for release
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DMG_PATH="apps/desktop/src-tauri/target/release/bundle/dmg/deepseek-code_${VERSION}_aarch64.dmg"

          if [ -f "$DMG_PATH" ]; then
            # 生成签名
            npx @tauri-apps/cli@latest signer sign \
              -k <(echo "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}") \
              -p "${{ secrets.TAURI_SIGNING_KEY_PASSWORD }}" \
              "$DMG_PATH" \
              2>/dev/null || echo "Warning: signing failed"

            echo "✅ Update signing completed"
          else
            echo "⚠️  DMG not found at $DMG_PATH, skipping updater signing"
          fi
