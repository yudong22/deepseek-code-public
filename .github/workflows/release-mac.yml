name: Release macOS Client

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name for the release (e.g. v0.1.0-beta.1)'
        required: false
        default: 'manual-build'
      skip_notarize:
        description: 'Skip Apple notarization (faster, for internal betas)'
        type: boolean
        required: false
        default: false

jobs:
  release:
    permissions:
      contents: write
    # macos-14 = 原生 Apple Silicon runner，省掉 cross-compile 到 aarch64 的开销
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun install
        # 缓存 Bun 全局模块缓存，避免每次都从 npm registry 全量拉
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('**/bun.lockb', '**/bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        # 不再 cross-compile：macos-14 runner 本身就是 aarch64

      - name: Rust Cache
        # macos-14 native aarch64 build，cargo 产物落到 src-tauri/target/release/...
        # （不再有 target/aarch64-apple-darwin/ 子目录）
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './apps/desktop/src-tauri -> target'

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        # 全量 lint：tabs + shellcheck + actionlint
        # 工具缺失时 warning，不 block
        run: |
          brew install shellcheck actionlint
          bun run lint

      - name: Export macOS Signing & Notarization Env (if secrets are set)
        shell: bash
        run: |
          # skip_notarize 透传：workflow_dispatch input 勾选后，
          # 故意不导出 APPLE_ID / APPLE_PASSWORD / APPLE_TEAM_ID，
          # 让 tauri-action 内部检测到 secrets 缺失而跳过 xcrun notarytool。
          # 这能在不修改 tauri.conf.json 的前提下跳过 notarize（节省 60–180s）。
          if [ "${{ inputs.skip_notarize }}" != "true" ] && [ -n "${{ secrets.APPLE_CERTIFICATE }}" ]; then
            echo "APPLE_CERTIFICATE=${{ secrets.APPLE_CERTIFICATE }}" >> $GITHUB_ENV
          fi
          if [ "${{ inputs.skip_notarize }}" != "true" ] && [ -n "${{ secrets.APPLE_CERTIFICATE_PASSWORD }}" ]; then
            echo "APPLE_CERTIFICATE_PASSWORD=${{ secrets.APPLE_CERTIFICATE_PASSWORD }}" >> $GITHUB_ENV
          fi
          if [ "${{ inputs.skip_notarize }}" != "true" ] && [ -n "${{ secrets.APPLE_SIGNING_IDENTITY }}" ]; then
            echo "APPLE_SIGNING_IDENTITY=${{ secrets.APPLE_SIGNING_IDENTITY }}" >> $GITHUB_ENV
          fi
          if [ "${{ inputs.skip_notarize }}" != "true" ] && [ -n "${{ secrets.APPLE_ID }}" ]; then
            echo "APPLE_ID=${{ secrets.APPLE_ID }}" >> $GITHUB_ENV
          fi
          if [ "${{ inputs.skip_notarize }}" != "true" ] && [ -n "${{ secrets.APPLE_PASSWORD }}" ]; then
            echo "APPLE_PASSWORD=${{ secrets.APPLE_PASSWORD }}" >> $GITHUB_ENV
          fi
          if [ "${{ inputs.skip_notarize }}" != "true" ] && [ -n "${{ secrets.APPLE_TEAM_ID }}" ]; then
            echo "APPLE_TEAM_ID=${{ secrets.APPLE_TEAM_ID }}" >> $GITHUB_ENV
          fi
          if [ "${{ inputs.skip_notarize }}" == "true" ]; then
            echo "⏭️  skip_notarize=true: Apple notarization skipped (faster build for internal betas)"
          fi

      - name: Export Updater Signing Env (for auto-update)
        shell: bash
        run: |
          if [ -n "${{ secrets.TAURI_SIGNING_KEY_PASSWORD }}" ]; then
            echo "TAURI_SIGNING_KEY_PASSWORD=${{ secrets.TAURI_SIGNING_KEY_PASSWORD }}" >> $GITHUB_ENV
          fi

      - name: Generate changelog
        # AI 生成 changelog（DeepSeek API），与 tauri build 并行
        # changelog 只依赖 git log（~3s），跟 build 产物完全无关
        shell: bash
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: >
          VERSION="${GITHUB_REF_NAME#v}"

          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -z "$PREV_TAG" ]; then
            echo "No previous tag found, using commit list"
            CHANGELOG="## v${VERSION} Release Notes\n\n$(git log --pretty=format:'- %s' -20)"
            echo -e "$CHANGELOG" > .release-notes.md
            exit 0
          fi

          COMMITS=$(git log "${PREV_TAG}..HEAD" --pretty=format:"%H%n%s%n%b%n---COMMIT_SEP---")

          FILE_CHANGES=$(git diff --stat "${PREV_TAG}..HEAD")

          PROMPT=$(printf '%s' 'You are a technical writer generating release notes in Chinese for a desktop AI programming assistant called deepseek-code (also known as OpenHands). It uses Tauri v2 + React 19 as the desktop client, a Rust-native agent loop, and a Go API gateway.

          Generate a well-structured changelog in Markdown format in Chinese. Follow these guidelines:

          1. Start with a brief summary paragraph (2-3 sentences) describing the overall theme of this release in Chinese
          2. Group changes into sections with these exact Chinese headers:
             - **新功能** - 引入的新功能、新特性或改进
             - **缺陷修复** - 针对已知或报告的缺陷/问题的修复
             - **改进与优化** - 性能提升、可靠性优化或代码质量改善
             - **文档更新** - 针对 README、各类文档、注释或配置的更新
             - **日常维护** - 构建流程、CI/CD、依赖包升级或重构等
          3. Each bullet should be concise but descriptive (one line) in Chinese
          4. Mention breaking changes prominently with a warning emoji at the top in Chinese
          5. Use imperative mood in Chinese (e.g. "添加功能" rather than "添加了功能")
          6. Keep it technical but accessible - target audience is developers using this tool
          7. Write all output and text in Chinese.

          Format output as clean Markdown without any preamble or explanation. Do not wrap the entire response in a code block.')

          USER_CONTENT="Git commits since ${PREV_TAG}:\n\n${COMMITS}\n\nFiles changed:\n\n${FILE_CHANGES}"

          MAX_CHARS=12000

          if [ "${#USER_CONTENT}" -gt "$MAX_CHARS" ]; then
            USER_CONTENT="${USER_CONTENT:0:MAX_CHARS}\n\n[...truncated for length...]"
          fi

          echo "Generating AI changelog from $PREV_TAG to v$VERSION ..."

          RESPONSE=$(curl -s -L -X POST "https://api.deepseek.com/chat/completions" \
            -H "Authorization: Bearer ${DEEPSEEK_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg prompt "$PROMPT" \
              --arg user "$USER_CONTENT" \
              '{
                model: "deepseek-chat",
                messages: [
                  {role: "system", content: $prompt},
                  {role: "user", content: $user}
                ],
                temperature: 0.3,
                max_tokens: 2000
              }' \
            )" \
          )

          CHANGELOG=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // empty')

          if [ -z "$CHANGELOG" ] || [ "$CHANGELOG" = "null" ]; then
            echo "Warning: AI changelog generation failed, using commit list instead" >&2
            echo "API response: $RESPONSE" >&2
            CHANGELOG="## v${VERSION} Release Notes\n\n$(git log "${PREV_TAG}..HEAD" --pretty=format:'- %s')"
          fi

          echo -e "$CHANGELOG" > .release-notes.md

          echo "📋 Changelog:"

          echo "$CHANGELOG"

      - name: Install create-dmg
        # macos-14 runner 没有预装 create-dmg，tauri build 打包 DMG 时会失败
        run: brew install create-dmg

      - name: Build and Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          tagName: ${{ github.event.inputs.tag_name || github.ref_name }}
          releaseName: 'deepseek-code ${{ github.event.inputs.tag_name || github.ref_name }}'
          releaseBody: '等待生成完整 changelog...'
          prerelease: false
          projectPath: apps/desktop
          tauriScript: bun run tauri
          # 原生 macos-14 runner 本身就是 aarch64，不需要 --target cross-compile
          # v0.5.2+: update.json 由 CI 后续 step 写到 updater/latest 分支（专用），
          # 不再让 tauri-action 上传 main 上的 update.json 作为 release asset。
          # 关闭后 tauri-action 不会因为 main 没有 update.json 而跳过 .app.tar.gz 上传。
          includeUpdaterJson: false
          uploadUpdaterJson: false

      - name: Generate updater signature
        # v0.5.2+: 此 step 只生成签名，导出 SIGNATURE / PLATFORM / ARCH_SHORT 到 $GITHUB_ENV，
        # 由下一 step "Commit update.json signature" 写入 updater/latest 分支。
        # （不再写 main 上的 update.json —— main 不再持有这个文件。）
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          # macos-14 原生 runner：cargo 产物直接落到 target/release/bundle
          ARCHIVE_DIR="apps/desktop/src-tauri/target/release/bundle"

          # 优先查找 .tar.gz（updater 格式），回退到 .dmg
          TAR_PATH=$(find "$ARCHIVE_DIR" -name "*.tar.gz" -print -quit 2>/dev/null || true)
          DMG_PATH=$(find "$ARCHIVE_DIR" -name "*.dmg" -print -quit 2>/dev/null || true)
          ARCHIVE="${TAR_PATH:-${DMG_PATH:-}}"

          if [ -z "$ARCHIVE" ]; then
            echo "⚠️  No bundle artifacts found, skipping signing"
            exit 1
          fi
          echo "Signing $ARCHIVE ..."

          # tauri signer sign 生成 .sig 文件（非 .minisig）
          SIG_FILE="${ARCHIVE}.sig"
          rm -f "$SIG_FILE"

          # ARCHIVE 路径相对于 repo root，需要在 --cwd 下去掉 apps/desktop/ 前缀
          ARCHIVE_REL="${ARCHIVE#apps/desktop/}"
          bun run --cwd apps/desktop tauri signer sign \
            -p "${{ secrets.TAURI_SIGNING_KEY_PASSWORD }}" \
            "$ARCHIVE_REL"

          # 从 .sig 文件读取签名（tauri signer sign 自动生成）
          if [ -f "$SIG_FILE" ]; then
            SIGNATURE=$(cat "$SIG_FILE")
            echo "✅ Signature generated (${#SIGNATURE} bytes)"
          else
            echo "❌ No .sig file generated at $SIG_FILE"
            exit 1
          fi

          if [ -z "$SIGNATURE" ]; then
            echo "❌ Signature is empty!"
            exit 1
          fi

          # 确定平台架构
          # macos-14 原生 runner 一定是 aarch64（Apple Silicon），
          # 但 tauri build 在不指定 --target 时产物文件名可能不带架构后缀，
          # 所以不再从文件名推断，直接硬编码。
          PLATFORM="darwin-aarch64"
          ARCH_SHORT="aarch64"

          # 导出到后续 step 使用
          {
            echo "SIGNATURE<<EOF"
            echo "$SIGNATURE"
            echo "EOF"
            echo "PLATFORM=$PLATFORM"
            echo "ARCH_SHORT=$ARCH_SHORT"
            echo "RELEASE_VERSION=$VERSION"
          } >> "$GITHUB_ENV"

          # 清理临时签名文件
          rm -f "$SIG_FILE"

      - name: Commit update.json signature
        # Failure here must not block the changelog/release-notes steps
        # below — otherwise the release body keeps the placeholder
        # "等待生成完整 changelog..." and never gets replaced.
        # v0.5.2+: 把签名 commit 推到专用 `updater/latest` 分支（不是 main）。
        # updater/latest 只包含 update.json 一个文件，被 force-with-lease 覆盖。
        # 这避免了 main 分支被 CI 流程污染 + 解除了 non-fast-forward 冲突。
        continue-on-error: true
        shell: bash
        run: |
          # update.json 不在 main 上（在 updater/latest 分支上），所以不能依赖
          # `git diff --quiet update.json` —— main working tree 没有此文件会 fatal。
          # 改用：如果前一步 Generate updater signature 导出了 SIGNATURE env，
          # 就把 SIGNATURE 内容直接应用 + 推到 updater/latest。

          if [ -z "${SIGNATURE:-}" ] || [ -z "${PLATFORM:-}" ]; then
            echo "::warning::SIGNATURE/PLATFORM not exported by previous step, skipping commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 保存当前 HEAD，用于最后切回
          ORIG_REF=$(git rev-parse HEAD)

          # 构建过程中 cargo build 会修改 Cargo.lock，
          # checkout 到其他分支前需要 stash 掉本地修改
          git stash push --include-untracked -m "CI: temp stash before updater/latest checkout"

          # 把 updater/latest 分支顶端 checkout 出来（保留 update.json）
          git fetch origin updater/latest
          git checkout -B updater/latest origin/updater/latest

          # 用 SIGNATURE 替换 update.json 里对应 PLATFORM 平台的 signature 字段
          SIGNATURE="$SIGNATURE" PLATFORM="$PLATFORM" ARCH_SHORT="$ARCH_SHORT" \
            RELEASE_VERSION="$RELEASE_VERSION" node -e "
              const fs = require('fs');
              const up = JSON.parse(fs.readFileSync('update.json', 'utf-8'));
              up.version = process.env.RELEASE_VERSION;
              up.pub_date = new Date().toISOString().replace(/\.\d{3}Z/, 'Z');
              const plat = process.env.PLATFORM;
              if (up.platforms && up.platforms[plat]) {
                up.platforms[plat].signature = process.env.SIGNATURE.trim();
                up.platforms[plat].url = 'https://github.com/yudong22/deepseek-code-public/releases/download/v' + process.env.RELEASE_VERSION + '/deepseek-code_' + process.env.ARCH_SHORT + '.app.tar.gz';
              } else {
                console.error('platform', plat, 'not in update.json; available:', Object.keys(up.platforms));
                process.exit(1);
              }
              fs.writeFileSync('update.json', JSON.stringify(up, null, 2) + '\n');
              console.log('updated update.json for', plat);
            "

          git add update.json
          if git diff --cached --quiet; then
            echo "::warning::nothing to commit (signature unchanged?)"
            git checkout -f "$ORIG_REF"
            git stash pop || true
            exit 0
          fi
          git commit -m "chore: update updater signature for $GITHUB_REF_NAME"

          # force-with-lease 安全：CI 自己是 updater/latest 唯一写入者
          git push --force-with-lease origin updater/latest
          echo "update.json signature committed to updater/latest"

          # 切回原来的 commit（构建产物还在磁盘上，后续 step 能访问）
          git checkout -f "$ORIG_REF"

          # 恢复构建过程中产生的本地修改（如 Cargo.lock）
          git stash pop || true

      - name: Upload release artifacts and publish release notes
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARCHIVE_DIR="apps/desktop/src-tauri/target/release/bundle"


          # 收集构建产物
          ARTIFACTS=()
          while IFS= read -r f; do
            ARTIFACTS+=("$f")
          done < <(find "$ARCHIVE_DIR" \( -name "*.dmg" -o -name "*.tar.gz" \) -print 2>/dev/null || true)

          if [ ${#ARTIFACTS[@]} -gt 0 ] && [ -f ".release-notes.md" ]; then
            echo "🚀 更新 Release 并上传构建产物..."
            gh release view "$GITHUB_REF_NAME" --json id >/dev/null 2>&1 || {
              echo "创建新 Release..."
              gh release create "$GITHUB_REF_NAME" \
                --title "v${VERSION}" \
                --notes-file .release-notes.md
            }
            gh release upload "$GITHUB_REF_NAME" "${ARTIFACTS[@]}" --clobber >/dev/null 2>&1 || true
            # 用生成的 changelog 更新 release body
            gh release edit "$GITHUB_REF_NAME" \
              --title "v${VERSION}" \
              --notes-file .release-notes.md
            echo "✅ Release v${VERSION} 已更新"
          else
            echo "⚠️ 未找到构建产物，跳过 Release 更新"
          fi
