name: Release macOS Client

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name for the release (e.g. v0.1.0-beta.1)'
        required: false
        default: 'manual-build'

jobs:
  release:
    permissions:
      contents: write
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './apps/desktop/src-tauri -> target'

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Export macOS Signing & Notarization Env (if secrets are set)
        shell: bash
        run: |
          if [ -n "${{ secrets.APPLE_CERTIFICATE }}" ]; then
            echo "APPLE_CERTIFICATE=${{ secrets.APPLE_CERTIFICATE }}" >> $GITHUB_ENV
          fi
          if [ -n "${{ secrets.APPLE_CERTIFICATE_PASSWORD }}" ]; then
            echo "APPLE_CERTIFICATE_PASSWORD=${{ secrets.APPLE_CERTIFICATE_PASSWORD }}" >> $GITHUB_ENV
          fi
          if [ -n "${{ secrets.APPLE_SIGNING_IDENTITY }}" ]]; then
            echo "APPLE_SIGNING_IDENTITY=${{ secrets.APPLE_SIGNING_IDENTITY }}" >> $GITHUB_ENV
          fi
          if [ -n "${{ secrets.APPLE_ID }}" ]; then
            echo "APPLE_ID=${{ secrets.APPLE_ID }}" >> $GITHUB_ENV
          fi
          if [ -n "${{ secrets.APPLE_PASSWORD }}" ]]; then
            echo "APPLE_PASSWORD=${{ secrets.APPLE_PASSWORD }}" >> $GITHUB_ENV
          fi
          if [ -n "${{ secrets.APPLE_TEAM_ID }}" ]]; then
            echo "APPLE_TEAM_ID=${{ secrets.APPLE_TEAM_ID }}" >> $GITHUB_ENV
          fi

      - name: Export Updater Signing Env (for auto-update)
        shell: bash
        run: |
          if [ -n "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}" ]; then
            echo "TAURI_SIGNING_PRIVATE_KEY=${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}" >> $GITHUB_ENV
          fi
          if [ -n "${{ secrets.TAURI_SIGNING_KEY_PASSWORD }}" ]]; then
            echo "TAURI_SIGNING_KEY_PASSWORD=${{ secrets.TAURI_SIGNING_KEY_PASSWORD }}" >> $GITHUB_ENV
          fi

      - name: Build and Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event.inputs.tag_name || github.ref_name }}
          releaseName: 'deepseek-code ${{ github.event.inputs.tag_name || github.ref_name }}'
          releaseBody: '等待生成完整 changelog...'
          prerelease: false
          projectPath: apps/desktop
          tauriScript: bun run tauri
          args: --target aarch64-apple-darwin

      - name: Generate updater signature and update update.json
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARCHIVE_DIR="apps/desktop/src-tauri/target/release/bundle"
          SIGNATURE=""

          # Tauri 构建时若设置了 TAURI_SIGNING_PRIVATE_KEY 会自动签名并输出签名
          # 这里从构建日志或 artifacts 中获取签名
          # 优先查找 .tar.gz（updater 格式），回退到 .dmg
          TAR_PATH=$(find "$ARCHIVE_DIR" -name "*.tar.gz" -print -quit 2>/dev/null || true)
          DMG_PATH=$(find "$ARCHIVE_DIR" -name "*.dmg" -print -quit 2>/dev/null || true)

          if [ -n "$TAR_PATH" ]; then
            echo "Signing $TAR_PATH ..."
            SIGNATURE=$(npx @tauri-apps/cli@latest signer sign \
              -k <(echo "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}") \
              -p "${{ secrets.TAURI_SIGNING_KEY_PASSWORD }}" \
              "$TAR_PATH" 2>/dev/null | grep -oP 'signature: \K\S+' || true)
          elif [ -n "$DMG_PATH" ]; then
            echo "Signing $DMG_PATH (no .tar.gz found) ..."
            SIGNATURE=$(npx @tauri-apps/cli@latest signer sign \
              -k <(echo "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}") \
              -p "${{ secrets.TAURI_SIGNING_KEY_PASSWORD }}" \
              "$DMG_PATH" 2>/dev/null | grep -oP 'signature: \K\S+' || true)
          else
            echo "⚠️  No bundle artifacts found, skipping signing"
          fi

          # 将签名写入 update.json
          if [ -n "$SIGNATURE" ] && [ -f "update.json" ]; then
            # 使用 Python 或 node 更新 JSON
            node -e "
              const fs = require('fs');
              const up = JSON.parse(fs.readFileSync('update.json', 'utf-8'));
              up.version = '$VERSION';
              up.pub_date = new Date().toISOString().replace(/\.\d{3}Z/, 'Z');
              if (up.platforms) {
                const arch = process.arch === 'arm64' ? 'aarch64' : 'x86_64';
                const key = 'darwin-' + arch;
                if (up.platforms[key]) {
                  up.platforms[key].signature = '$SIGNATURE';
                  up.platforms[key].url = 'https://github.com/yudong22/deepseek-code-public/releases/download/v$VERSION/deepseek-code_' + arch + '.app.tar.gz';
                }
              }
              fs.writeFileSync('update.json', JSON.stringify(up, null, 2) + '\n');
              console.log('✅ update.json updated with signature');
            "
          else
            echo "⚠️  No signature generated, update.json unchanged"
          fi

      - name: Commit update.json signature
        shell: bash
        run: |
          if git diff --quiet update.json; then
            echo "update.json unchanged, skipping commit"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add update.json
            git commit -m "chore: update updater signature for $GITHUB_REF_NAME"
            git push
            echo "✅ update.json signature committed"
          fi

      - name: Generate changelog and update release
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          # 生成分类 changelog
          CHANGELOG=$(
            echo "## v${VERSION} Release Notes"
            echo ""
            for type in "feat:🚀 新功能" "fix:🐛 Bug 修复" "docs:📝 文档" "refactor:♻️ 重构" "style:🎨 样式" "test:✅ 测试" "chore:🔧 工程化"; do
              label="${type#*:}"
              prefix="${type%:*}"
              LOGS=$(git log --oneline --no-decorate ${PREV_TAG:+"${PREV_TAG}..HEAD"} --grep="^${prefix}" 2>/dev/null | sed 's/^[a-f0-9]* //' | sed 's/^/- /')
              if [ -n "$LOGS" ]; then
                echo "### ${label}"
                echo "$LOGS"
                echo ""
              fi
            done
            # 未分类的
            REST=$(git log --oneline --no-decorate ${PREV_TAG:+"${PREV_TAG}..HEAD"} 2>/dev/null | grep -vE '^[a-f0-9]+ (feat|fix|docs|refactor|style|test|chore)[:(]' | sed 's/^[a-f0-9]* //' | sed 's/^/- /')
            if [ -n "$REST" ]; then
              echo "### 📦 其他"
              echo "$REST"
              echo ""
            fi
          )

          echo "$CHANGELOG" > .release-notes.md
          echo "📋 Changelog:"
          echo "$CHANGELOG"

      - name: Upload release artifacts and publish release notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARCHIVE_DIR="apps/desktop/src-tauri/target/release/bundle"

          # 收集构建产物
          ARTIFACTS=()
          while IFS= read -r f; do
            ARTIFACTS+=("$f")
          done < <(find "$ARCHIVE_DIR" \( -name "*.dmg" -o -name "*.tar.gz" \) -print 2>/dev/null || true)

          if [ ${#ARTIFACTS[@]} -gt 0 ] && [ -f ".release-notes.md" ]; then
            echo "🚀 更新 Release 并上传构建产物..."
            gh release view "$GITHUB_REF_NAME" --json id >/dev/null 2>&1 || {
              echo "创建新 Release..."
              gh release create "$GITHUB_REF_NAME" \
                --title "v${VERSION}" \
                --notes-file .release-notes.md
            }
            gh release upload "$GITHUB_REF_NAME" "${ARTIFACTS[@]}" --clobber
            echo "✅ Release v${VERSION} 已更新"
          else
            echo "⚠️ 未找到构建产物，跳过 Release 更新"
          fi
