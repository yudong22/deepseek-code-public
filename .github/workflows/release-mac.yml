name: Release macOS Client

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name for the release (e.g. v0.1.0-beta.1)'
        required: false
        default: 'manual-build'

jobs:
  release:
    permissions:
      contents: write
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './apps/desktop/src-tauri -> target'

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Export macOS Signing & Notarization Env (if secrets are set)
        shell: bash
        run: |
          if [ -n "${{ secrets.APPLE_CERTIFICATE }}" ]; then
            echo "APPLE_CERTIFICATE=${{ secrets.APPLE_CERTIFICATE }}" >> $GITHUB_ENV
          fi
          if [ -n "${{ secrets.APPLE_CERTIFICATE_PASSWORD }}" ]; then
            echo "APPLE_CERTIFICATE_PASSWORD=${{ secrets.APPLE_CERTIFICATE_PASSWORD }}" >> $GITHUB_ENV
          fi
          if [ -n "${{ secrets.APPLE_SIGNING_IDENTITY }}" ]]; then
            echo "APPLE_SIGNING_IDENTITY=${{ secrets.APPLE_SIGNING_IDENTITY }}" >> $GITHUB_ENV
          fi
          if [ -n "${{ secrets.APPLE_ID }}" ]; then
            echo "APPLE_ID=${{ secrets.APPLE_ID }}" >> $GITHUB_ENV
          fi
          if [ -n "${{ secrets.APPLE_PASSWORD }}" ]]; then
            echo "APPLE_PASSWORD=${{ secrets.APPLE_PASSWORD }}" >> $GITHUB_ENV
          fi
          if [ -n "${{ secrets.APPLE_TEAM_ID }}" ]]; then
            echo "APPLE_TEAM_ID=${{ secrets.APPLE_TEAM_ID }}" >> $GITHUB_ENV
          fi

      - name: Export Updater Signing Env (for auto-update)
        shell: bash
        run: |
          if [ -n "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}" ]; then
            echo "TAURI_SIGNING_PRIVATE_KEY=${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}" >> $GITHUB_ENV
          fi
          if [ -n "${{ secrets.TAURI_SIGNING_KEY_PASSWORD }}" ]; then
            echo "TAURI_SIGNING_KEY_PASSWORD=${{ secrets.TAURI_SIGNING_KEY_PASSWORD }}" >> $GITHUB_ENV
          fi

      - name: Build and Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event.inputs.tag_name || github.ref_name }}
          releaseName: 'deepseek-code ${{ github.event.inputs.tag_name || github.ref_name }}'
          releaseBody: '等待生成完整 changelog...'
          prerelease: false
          projectPath: apps/desktop
          tauriScript: bun run tauri
          args: --target aarch64-apple-darwin

      - name: Generate updater signature and update update.json
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          if [ -d "apps/desktop/src-tauri/target/aarch64-apple-darwin/release/bundle" ]; then
            ARCHIVE_DIR="apps/desktop/src-tauri/target/aarch64-apple-darwin/release/bundle"
          else
            ARCHIVE_DIR="apps/desktop/src-tauri/target/release/bundle"
          fi

          # 优先查找 .tar.gz（updater 格式），回退到 .dmg
          TAR_PATH=$(find "$ARCHIVE_DIR" -name "*.tar.gz" -print -quit 2>/dev/null || true)
          DMG_PATH=$(find "$ARCHIVE_DIR" -name "*.dmg" -print -quit 2>/dev/null || true)
          ARCHIVE="${TAR_PATH:-${DMG_PATH:-}}"

          if [ -z "$ARCHIVE" ]; then
            echo "⚠️  No bundle artifacts found, skipping signing"
            exit 1
          fi
          echo "Signing $ARCHIVE ..."

          # 将私钥写入临时文件（-f 接受文件路径，比 -k 传字符串更可靠）
          TMPKEY=$(mktemp)
          echo "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}" > "$TMPKEY"

          # 清理可能已存在的 .minisig 文件（Tauri 构建可能自动生成）
          SIG_FILE="${ARCHIVE}.minisig"
          rm -f "$SIG_FILE"

          # 使用项目本地 CLI 签名（bun run tauri 确保使用 lockfile 中的版本）
          # 注意: 不使用 2>/dev/null，以便失败时能看到错误
          bun run --cwd apps/desktop tauri signer sign \
            -f "$TMPKEY" \
            -p "${{ secrets.TAURI_SIGNING_KEY_PASSWORD }}" \
            "$ARCHIVE"

          # 从 .minisig 文件读取签名（比解析 stdout 更可靠）
          if [ -f "$SIG_FILE" ]; then
            SIGNATURE=$(cat "$SIG_FILE")
            echo "✅ Signature generated (${#SIGNATURE} bytes)"
          else
            echo "❌ No .minisig file generated at $SIG_FILE"
            echo "   Tauri signer output:"
            bun run --cwd apps/desktop tauri signer sign \
              -f "$TMPKEY" \
              -p "${{ secrets.TAURI_SIGNING_KEY_PASSWORD }}" \
              "$ARCHIVE" 2>&1 || true
            rm -f "$TMPKEY"
            exit 1
          fi
          rm -f "$TMPKEY"

          if [ -z "$SIGNATURE" ]; then
            echo "❌ Signature is empty!"
            exit 1
          fi

          # 确定平台架构
          if echo "$ARCHIVE" | grep -q "aarch64"; then
            PLATFORM="darwin-aarch64"
            ARCH_SHORT="aarch64"
          elif echo "$ARCHIVE" | grep -q "x86_64"; then
            PLATFORM="darwin-x86_64"
            ARCH_SHORT="x86_64"
          else
            echo "⚠️  Unknown architecture from archive name, skipping platform detection"
            PLATFORM=""
          fi

          # 将签名写入 update.json
          if [ -n "$PLATFORM" ] && [ -f "update.json" ]; then
            node -e "
              const fs = require('fs');
              const up = JSON.parse(fs.readFileSync('update.json', 'utf-8'));
              up.version = '$VERSION';
              up.pub_date = new Date().toISOString().replace(/\.\d{3}Z/, 'Z');
              const plat = '$PLATFORM';
              if (up.platforms && up.platforms[plat]) {
                up.platforms[plat].signature = require('fs').readFileSync('/dev/stdin', 'utf-8').trim();
                up.platforms[plat].url = 'https://github.com/yudong22/deepseek-code-public/releases/download/v$VERSION/deepseek-code_${ARCH_SHORT}.app.tar.gz';
              }
              fs.writeFileSync('update.json', JSON.stringify(up, null, 2) + '\n');
              console.log('update.json updated for ' + plat);
            " <<< "$SIGNATURE"
            echo "update.json 已更新签名: ${SIGNATURE:0:40}..."
          elif [ -f "update.json" ]; then
            echo "⚠️  Unknown platform, only updating version in update.json"
            node -e "
              const fs = require('fs');
              const up = JSON.parse(fs.readFileSync('update.json', 'utf-8'));
              up.version = '$VERSION';
              up.pub_date = new Date().toISOString().replace(/\.\d{3}Z/, 'Z');
              fs.writeFileSync('update.json', JSON.stringify(up, null, 2) + '\n');
            "
          fi

          # 清理临时签名文件
          rm -f "$SIG_FILE"

      - name: Commit update.json signature
        shell: bash
        run: |
          if git diff --quiet update.json; then
            echo "update.json unchanged, skipping commit"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add update.json
            git commit -m "chore: update updater signature for $GITHUB_REF_NAME"
            git push
            echo "update.json signature committed"
          fi

      - name: Generate changelog and update release
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          # 生成分类 changelog
          CHANGELOG=$(
            echo "## v${VERSION} Release Notes"
            echo ""
            for type in "feat:🚀 新功能" "fix:🐛 Bug 修复" "docs:📝 文档" "refactor:♻️ 重构" "style:🎨 样式" "test:✅ 测试" "chore:🔧 工程化"; do
              label="${type#*:}"
              prefix="${type%:*}"
              LOGS=$(git log --oneline --no-decorate ${PREV_TAG:+"${PREV_TAG}..HEAD"} --grep="^${prefix}" 2>/dev/null | sed 's/^[a-f0-9]* //' | sed 's/^/- /')
              if [ -n "$LOGS" ]; then
                echo "### ${label}"
                echo "$LOGS"
                echo ""
              fi
            done
            # 未分类的
            REST=$(git log --oneline --no-decorate ${PREV_TAG:+"${PREV_TAG}..HEAD"} 2>/dev/null | grep -vE '^[a-f0-9]+ (feat|fix|docs|refactor|style|test|chore)[:(]' | sed 's/^[a-f0-9]* //' | sed 's/^/- /')
            if [ -n "$REST" ]; then
              echo "### 📦 其他"
              echo "$REST"
              echo ""
            fi
          )

          echo "$CHANGELOG" > .release-notes.md
          echo "📋 Changelog:"
          echo "$CHANGELOG"

      - name: Upload release artifacts and publish release notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [ -d "apps/desktop/src-tauri/target/aarch64-apple-darwin/release/bundle" ]; then
            ARCHIVE_DIR="apps/desktop/src-tauri/target/aarch64-apple-darwin/release/bundle"
          else
            ARCHIVE_DIR="apps/desktop/src-tauri/target/release/bundle"
          fi

          # 收集构建产物
          ARTIFACTS=()
          while IFS= read -r f; do
            ARTIFACTS+=("$f")
          done < <(find "$ARCHIVE_DIR" \( -name "*.dmg" -o -name "*.tar.gz" \) -print 2>/dev/null || true)

          if [ ${#ARTIFACTS[@]} -gt 0 ] && [ -f ".release-notes.md" ]; then
            echo "🚀 更新 Release 并上传构建产物..."
            gh release view "$GITHUB_REF_NAME" --json id >/dev/null 2>&1 || {
              echo "创建新 Release..."
              gh release create "$GITHUB_REF_NAME" \
                --title "v${VERSION}" \
                --notes-file .release-notes.md
            }
            gh release upload "$GITHUB_REF_NAME" "${ARTIFACTS[@]}" --clobber >/dev/null 2>&1 || true
            # 用生成的 changelog 更新 release body
            gh release edit "$GITHUB_REF_NAME" \
              --title "v${VERSION}" \
              --notes-file .release-notes.md
            echo "✅ Release v${VERSION} 已更新"
          else
            echo "⚠️ 未找到构建产物，跳过 Release 更新"
          fi
